name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: { }

jobs:
  classify-ci-trust:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      trusted: ${{ steps.classify.outputs.trusted }}

    steps:
      - id: classify
        name: Classify pull request trust
        shell: bash
        env:
          ACTOR: ${{ github.event.pull_request.user.login }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          trusted="false"
          case "$ACTOR" in
            Corvus400|renovate\[bot\])
              if [ "$HEAD_REPOSITORY" = "$REPOSITORY" ]; then
                trusted="true"
              fi
              ;;
          esac

          echo "trusted=$trusted" >> "$GITHUB_OUTPUT"
          echo "trusted=$trusted"

  detect-ci-scope:
    needs: [classify-ci-trust]
    if: needs.classify-ci-trust.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    outputs:
      golden_vrt_required: ${{ steps.changed.outputs.golden_vrt_required }}

    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - id: changed
        name: Detect golden VRT scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt

          golden_vrt_required="false"
          while IFS= read -r file; do
            case "$file" in
              .github/actions/setup-flutter/*|\
              .github/workflows/ci.yml|\
              .github/workflows/vrt-comment.yml|\
              analysis_options.yaml|\
              assets/*|\
              fonts/*|\
              lib/*|\
              l10n.yaml|\
              pubspec.lock|\
              pubspec.yaml|\
              test/*)
                golden_vrt_required="true"
                break
                ;;
            esac
          done < changed-files.txt

          echo "golden_vrt_required=$golden_vrt_required" >> "$GITHUB_OUTPUT"
          echo "golden_vrt_required=$golden_vrt_required"

  non-golden-tests:
    needs: [classify-ci-trust]
    if: needs.classify-ci-trust.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout merged commit with base and pull-request branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/setup-flutter

      - name: Run non-golden tests
        env:
          SUPPRESS_GOLDEN_HOST_WARNING: "true"
        run: >
          flutter test
          --exclude-tags golden
          --fail-fast
          --concurrency "$(nproc)"
          test

  golden-vrt:
    needs: [classify-ci-trust, detect-ci-scope, non-golden-tests]
    if: >
      needs.classify-ci-trust.outputs.trusted == 'true' &&
      needs.detect-ci-scope.outputs.golden_vrt_required == 'true'
    runs-on: macos-26
    timeout-minutes: 45

    strategy:
      fail-fast: true
      matrix:
        shard: [0, 1, 2, 3]

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout merged commit with base and pull-request branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/setup-flutter

      - name: Run golden VRT shard
        run: >
          ./scripts/run-command-stop-on-output-pattern.sh
          flutter test
          --fail-fast
          --tags golden
          --total-shards 4
          --shard-index ${{ matrix.shard }}

      - name: Upload golden diff reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: golden-diff-reports-${{ matrix.shard }}
          path: |
            build/outputs/golden/**/*.png
            build/test-results/golden/**/*.json
          retention-days: 30
          if-no-files-found: ignore

  collect-golden-diff-reports:
    needs: [classify-ci-trust, non-golden-tests, golden-vrt]
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      needs.classify-ci-trust.outputs.trusted == 'true' &&
      needs.non-golden-tests.result == 'success' &&
      needs.golden-vrt.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout pull-request branch metadata
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Prepare merged artifact directory
        run: mkdir -p golden-diff-reports/build

      - name: Download golden shard artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: golden-diff-reports-*
          path: golden-diff-reports/build
          merge-multiple: true

      - name: Upload merged golden diff reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: golden-diff-reports
          path: golden-diff-reports/build
          retention-days: 30
          if-no-files-found: ignore

      - name: Save PR metadata for comment
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p ./pr
          printf '%s\n' "${{ github.event.number }}" > ./pr/NR
          printf '%s\n' "$BASE_SHA" > ./pr/BASE_SHA
          printf '%s\n' "$HEAD_SHA" > ./pr/HEAD_SHA
          ./.github/scripts/collect_golden_baseline_changes.sh \
            "$BASE_SHA" \
            "$HEAD_SHA" \
            ./pr/golden-baseline-files.tsv

      - name: Upload PR metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr
          path: pr/

  ci-gate:
    needs: [classify-ci-trust, detect-ci-scope, non-golden-tests, golden-vrt]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check required CI jobs
        env:
          CLASSIFY_RESULT: ${{ needs.classify-ci-trust.result }}
          TRUSTED: ${{ needs.classify-ci-trust.outputs.trusted }}
          DETECT_SCOPE_RESULT: ${{ needs.detect-ci-scope.result }}
          GOLDEN_VRT_REQUIRED: ${{ needs.detect-ci-scope.outputs.golden_vrt_required }}
          NON_GOLDEN_RESULT: ${{ needs.non-golden-tests.result }}
          GOLDEN_VRT_RESULT: ${{ needs.golden-vrt.result }}
        run: |
          set -euo pipefail
          if [ "$CLASSIFY_RESULT" != "success" ]; then
            echo "::error::classify-ci-trust result is $CLASSIFY_RESULT"
            exit 1
          fi
          if [ "$TRUSTED" != "true" ]; then
            echo "::error::External pull requests are not accepted for this portfolio repository."
            exit 1
          fi
          if [ "$DETECT_SCOPE_RESULT" != "success" ]; then
            echo "::error::detect-ci-scope result is $DETECT_SCOPE_RESULT"
            exit 1
          fi
          if [ "$NON_GOLDEN_RESULT" != "success" ]; then
            echo "::error::non-golden-tests result is $NON_GOLDEN_RESULT"
            exit 1
          fi
          if [ "$GOLDEN_VRT_REQUIRED" = "true" ] && [ "$GOLDEN_VRT_RESULT" != "success" ]; then
            echo "::error::golden-vrt result is $GOLDEN_VRT_RESULT"
            exit 1
          fi
          if [ "$GOLDEN_VRT_REQUIRED" != "true" ] && [ "$GOLDEN_VRT_RESULT" != "skipped" ]; then
            echo "::error::golden-vrt should be skipped for this PR scope, but result is $GOLDEN_VRT_RESULT"
            exit 1
          fi
          echo "All required CI jobs passed."
