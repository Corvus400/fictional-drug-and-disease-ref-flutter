name: vrt

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  vrt:
    runs-on: macos-26
    timeout-minutes: 60

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout merged commit with base and pull-request branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/setup-flutter

      - name: Run golden tests
        run: flutter test --tags golden

      - name: Upload golden diff reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: golden-diff-reports
          path: |
            build/outputs/golden/**/*.png
            build/test-results/golden/**/*.json
          retention-days: 30

      - name: Save PR number for comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: |
          mkdir -p ./pr
          echo ${{ github.event.number }} > ./pr/NR

      - name: Upload PR number
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ always() && github.event_name == 'pull_request' }}
        with:
          name: pr
          path: pr/
