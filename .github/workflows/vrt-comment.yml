name: vrt-comment

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

permissions: { }

jobs:
  classify-vrt-trust:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pull-requests: read

    outputs:
      trusted: ${{ steps.classify.outputs.trusted }}
      pull_request_number: ${{ steps.classify.outputs.pull_request_number }}

    steps:
      - id: classify
        name: Classify workflow run trust
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          trusted="false"
          pull_request_number=""
          if [ -n "${PR_NUMBER:-}" ] && [ "$PR_NUMBER" != "null" ]; then
            pull_request_number="$PR_NUMBER"
            pr_fields="$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" --jq '[.user.login, .head.repo.full_name] | @tsv')"
            IFS=$'\t' read -r actor head_repository <<< "$pr_fields"

            case "$actor" in
              Corvus400|renovate\[bot\])
                if [ "$head_repository" = "$REPOSITORY" ]; then
                  trusted="true"
                fi
                ;;
            esac
          fi

          echo "trusted=$trusted" >> "$GITHUB_OUTPUT"
          echo "pull_request_number=$pull_request_number" >> "$GITHUB_OUTPUT"
          echo "trusted=$trusted"

  vrt-comment:
    needs: [classify-vrt-trust]
    if: >
      needs.classify-vrt-trust.outputs.trusted == 'true' &&
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure')

    timeout-minutes: 10

    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - id: download-pr
        uses: dawidd6/action-download-artifact@ac66b43f0e6a346234dd65d4d0c8fbb31cb316e5 # v11
        continue-on-error: true
        with:
          name: pr
          run_id: ${{ github.event.workflow_run.id }}

      - name: Skip when VRT did not run
        if: steps.download-pr.outcome != 'success'
        shell: bash
        run: echo "No PR artifact was uploaded, so there is no VRT comment to update."

      - id: get-pull-request-number
        name: Get pull request number
        if: steps.download-pr.outcome == 'success'
        env:
          EXPECTED_PULL_REQUEST_NUMBER: ${{ needs.classify-vrt-trust.outputs.pull_request_number }}
        shell: bash
        run: |
          artifact_pull_request_number="$(cat NR)"
          if [ "$artifact_pull_request_number" != "$EXPECTED_PULL_REQUEST_NUMBER" ]; then
            echo "::error::PR artifact number does not match workflow_run pull request."
            exit 1
          fi
          echo "pull_request_number=$EXPECTED_PULL_REQUEST_NUMBER" >> "$GITHUB_OUTPUT"

      - name: main checkout
        id: checkout-main
        if: steps.download-pr.outcome == 'success'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main

      - name: Preserve baseline compare generator
        if: steps.download-pr.outcome == 'success'
        run: cp .github/scripts/generate_golden_baseline_compares.py "$RUNNER_TEMP/generate_golden_baseline_compares.py"

      - id: switch-companion-branch
        if: steps.download-pr.outcome == 'success'
        env:
          BRANCH_NAME: companion-pr-${{ needs.classify-vrt-trust.outputs.pull_request_number }}
        run: |
          # orphan means it will create no history branch
          git branch -D "$BRANCH_NAME" || true
          git checkout --orphan "$BRANCH_NAME"
          git rm -rf .

      - uses: dawidd6/action-download-artifact@ac66b43f0e6a346234dd65d4d0c8fbb31cb316e5 # v11
        if: steps.download-pr.outcome == 'success'
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: golden-diff-reports
          path: golden-diff-reports/build

      - id: check-if-there-are-valid-files
        name: Check if there are valid files
        if: steps.download-pr.outcome == 'success'
        shell: bash
        run: |
          # Find all the files ending with _compare.png
          mapfile -d '' -t files_to_add < <(find . -type f -name "*_compare.png" -print0)

          # Check for invalid file names and add only valid ones
          exist_valid_files="false"
          for file in "${files_to_add[@]}"; do
            if [[ $file =~ ^([-0-9A-Z_a-z.\ \/]|\[|\])+$ ]]; then
              exist_valid_files="true"
              break
            fi
          done
          echo "exist_valid_files=$exist_valid_files" >> "$GITHUB_OUTPUT"

      - id: collect-golden-baseline-changes
        name: Collect golden baseline changes
        if: steps.download-pr.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get-pull-request-number.outputs.pull_request_number }}
        shell: bash
        run: |
          set -euo pipefail

          pr_shas="$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '[.base.sha, .head.sha] | @tsv')"
          IFS=$'\t' read -r base_sha head_sha <<< "$pr_shas"

          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

          gh api --paginate "repos/${{ github.repository }}/pulls/$PR_NUMBER/files" \
            --jq '.[] | select(.filename | test("^test/.*/goldens/.*/.*\\.png$")) | [.status, .filename, (.previous_filename // "")] | @tsv' \
            > golden-baseline-files.tsv

          baseline_change_count="$(wc -l < golden-baseline-files.tsv | tr -d ' ')"
          has_baseline_changes="false"
          if [ "$baseline_change_count" -gt 0 ]; then
            has_baseline_changes="true"
          fi

          echo "baseline_change_count=$baseline_change_count" >> "$GITHUB_OUTPUT"
          echo "has_baseline_changes=$has_baseline_changes" >> "$GITHUB_OUTPUT"
          echo "baseline_change_count=$baseline_change_count"

      - id: push-screenshot-diff
        shell: bash
        if: >
          steps.download-pr.outcome == 'success' &&
          (steps.check-if-there-are-valid-files.outputs.exist_valid_files == 'true' ||
          steps.collect-golden-baseline-changes.outputs.has_baseline_changes == 'true')
        env:
          BRANCH_NAME: companion-pr-${{ needs.classify-vrt-trust.outputs.pull_request_number }}
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ steps.collect-golden-baseline-changes.outputs.base_sha }}
          HEAD_SHA: ${{ steps.collect-golden-baseline-changes.outputs.head_sha }}
        run: |
          if [ -s golden-baseline-files.tsv ]; then
            python3 "$RUNNER_TEMP/generate_golden_baseline_compares.py" \
              "${{ github.repository }}" \
              "$BASE_SHA" \
              "$HEAD_SHA" \
              golden-baseline-files.tsv \
              golden-baseline-compares
          fi

          # Find all the files ending with _compare.png
          mapfile -d '' -t files_to_add < <(find . -type f -name "*_compare.png" -print0)

          # Check for invalid file names and add only valid ones
          for file in "${files_to_add[@]}"; do
            if [[ "$file" =~ ^([-0-9A-Z_a-z.\ \/]|\[|\])+$ ]]; then
              git add "$file"
            fi
          done
          git config --global user.name ScreenshotBot
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Add screenshot diff"
          git push origin HEAD:"$BRANCH_NAME" -f

      - id: generate-vrt-report
        name: Generate VRT report
        if: >
          steps.download-pr.outcome == 'success' &&
          (steps.check-if-there-are-valid-files.outputs.exist_valid_files == 'true' ||
          steps.collect-golden-baseline-changes.outputs.has_baseline_changes == 'true')
        env:
          BRANCH_NAME: companion-pr-${{ needs.classify-vrt-trust.outputs.pull_request_number }}
          BASE_SHA: ${{ steps.collect-golden-baseline-changes.outputs.base_sha }}
          HEAD_SHA: ${{ steps.collect-golden-baseline-changes.outputs.head_sha }}
          BASELINE_CHANGE_COUNT: ${{ steps.collect-golden-baseline-changes.outputs.baseline_change_count }}
        shell: bash
        run: |
          set -euo pipefail

          url_path() {
            local value="$1"
            value="${value//%/%25}"
            value="${value//#/%23}"
            value="${value//[/%5B}"
            value="${value//]/%5D}"
            value="${value// /%20}"
            printf '%s' "$value"
          }

          image_link() {
            local sha="$1"
            local path="$2"
            local encoded_path
            encoded_path="$(url_path "$path")"
            printf '<img src="https://github.com/${{ github.repository }}/blob/%s/%s?raw=true" width="220">' "$sha" "$encoded_path"
          }

          compare_image_link() {
            local path="$1"
            local encoded_path
            encoded_path="$(url_path "$path")"
            printf '<img src="https://github.com/${{ github.repository }}/blob/%s/%s?raw=true" width="900">' "$BRANCH_NAME" "$encoded_path"
          }

          safe_stem() {
            local value="$1"
            value="${value%.png}"
            value="$(printf '%s' "$value" | sed -E 's/[^0-9A-Za-z._-]+/_/g')"
            printf '%s' "$value"
          }

          # Find all comparator failure images. Baseline-change compare images
          # are rendered separately below so file paths do not squeeze previews.
          mapfile -d '' -t files < <(find golden-diff-reports -type f -name "*_compare.png" -print0 2>/dev/null)
          delimiter="$(openssl rand -hex 8)"
          {
            echo "reports<<${delimiter}"

            echo "Snapshot diff report"

            if [ "${#files[@]}" -gt 0 ]; then
              echo
              echo "## Golden comparator mismatches"
              echo "| File name | Image |"
              echo "|-------|-------|"
            fi
          } >> "$GITHUB_OUTPUT"

          for file in "${files[@]}"; do
            fileName=$(basename "$file" | sed -r 's/(.{20})/\1<br>/g')
            urlPart="${BRANCH_NAME//#/%23}/${file//#/%23}"
            urlPart="${urlPart//[/%5B}"
            urlPart="${urlPart//]/%5D}"
            urlPart="${urlPart// /%20}"
            echo "| [$fileName](https://github.com/${{ github.repository }}/blob/$urlPart) | ![](https://github.com/${{ github.repository }}/blob/$urlPart?raw=true) |" >> "$GITHUB_OUTPUT"
          done

          if [ -s golden-baseline-files.tsv ]; then
            {
              echo
              echo "## Golden baseline changes"
              echo
              echo "CI compares rendered output against the golden files committed in this PR. This section shows golden PNG changes against the base branch for review."
              echo
              echo "Changed golden baseline files: ${BASELINE_CHANGE_COUNT}"
            } >> "$GITHUB_OUTPUT"

            row_count=0
            max_image_rows=200
            while IFS=$'\t' read -r status file previous_file; do
              row_count=$((row_count + 1))
              display_file="$file"
              if [ "$status" = "renamed" ] && [ -n "$previous_file" ]; then
                display_file="$previous_file -> $file"
              fi

              if [ "$row_count" -le "$max_image_rows" ]; then
                compare_path="golden-baseline-compares/baseline_$(safe_stem "$file")_compare.png"
                {
                  echo
                  echo "<table>"
                  echo "  <tr><th>Status</th><td><code>$status</code></td></tr>"
                  echo "  <tr><th>File</th><td><code>$display_file</code></td></tr>"
                  echo "  <tr><th>変更前 / 差分 / 変更後</th><td>$(compare_image_link "$compare_path")</td></tr>"
                  echo "</table>"
                } >> "$GITHUB_OUTPUT"
              fi
            done < golden-baseline-files.tsv

            if [ "$row_count" -gt "$max_image_rows" ]; then
              hidden_count=$((row_count - max_image_rows))
              echo >> "$GITHUB_OUTPUT"
              echo "_${hidden_count} additional golden baseline file(s) omitted from image preview to keep the comment size bounded._" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Find Comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
        id: fc
        if: steps.download-pr.outcome == 'success'
        with:
          issue-number: ${{ steps.get-pull-request-number.outputs.pull_request_number }}
          comment-author: 'github-actions[bot]'
          body-includes: Snapshot diff report

      - name: Delete outdated comment on PR
        if: >
          steps.download-pr.outcome == 'success' &&
          steps.check-if-there-are-valid-files.outputs.exist_valid_files == 'false' &&
          steps.collect-golden-baseline-changes.outputs.has_baseline_changes == 'false' &&
          steps.fc.outputs.comment-id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api \
            --method DELETE \
            "repos/${{ github.repository }}/issues/comments/${{ steps.fc.outputs.comment-id }}"

      - name: Delete outdated companion branch
        if: >
          steps.download-pr.outcome == 'success' &&
          steps.check-if-there-are-valid-files.outputs.exist_valid_files == 'false' &&
          steps.collect-golden-baseline-changes.outputs.has_baseline_changes == 'false'
        env:
          BRANCH_NAME: companion-pr-${{ needs.classify-vrt-trust.outputs.pull_request_number }}
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null; then
            git push origin --delete "$BRANCH_NAME"
          else
            echo "No companion branch to delete: $BRANCH_NAME"
          fi

      - name: Add or update comment on PR
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        if: >
          steps.download-pr.outcome == 'success' &&
          steps.generate-vrt-report.outputs.reports != ''
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.get-pull-request-number.outputs.pull_request_number }}
          body: ${{ steps.generate-vrt-report.outputs.reports }}
          edit-mode: replace

      - name: Cleanup outdated companion branches
        if: steps.download-pr.outcome == 'success'
        run: |
          # Find outdated companion branches with last commit date
          git branch -r --format="%(refname:lstrip=3)" | grep '^companion-pr-' | while read -r branch; do
            last_commit_date_timestamp=$(git log -1 --format=%ct "origin/$branch")
            now_timestamp=$(date +%s)
            # Delete branch if it's older than 1 month
            # if [ $((now_timestamp - last_commit_date_timestamp)) -gt 2592000 ]; then
            # For testing purpose, delete branch if it's older than 1 second
            echo "branch: $branch now_timestamp: $now_timestamp last_commit_date_timestamp: $last_commit_date_timestamp"
            if [ $((now_timestamp - last_commit_date_timestamp)) -gt 1 ]; then
              # Comment out for demonstration purpose
              echo "Deleting $branch"

              # git push origin --delete "$branch"
            fi
          done
