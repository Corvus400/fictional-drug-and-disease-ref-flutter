name: Setup Flutter
description: Install pinned Flutter SDK and prepare generated sources.

runs:
  using: composite
  steps:
    - name: Read Flutter version
      id: flutter-version
      shell: bash
      run: |
        version="$(tr -d '[:space:]' < .flutter-version)"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Install Flutter SDK
      shell: bash
      run: |
        set -euo pipefail

        version="${{ steps.flutter-version.outputs.version }}"
        flutter_root="$RUNNER_TEMP/flutter-sdk-$version"

        git -c advice.detachedHead=false clone \
          --depth 1 \
          --branch "$version" \
          https://github.com/flutter/flutter.git \
          "$flutter_root"

        echo "FLUTTER_ROOT=$flutter_root" >> "$GITHUB_ENV"
        echo "$flutter_root/bin" >> "$GITHUB_PATH"
        git config --global --add safe.directory "$flutter_root"

        "$flutter_root/bin/flutter" --version
        "$flutter_root/bin/flutter" config --no-analytics

    - name: Install dependencies
      shell: bash
      run: flutter pub get

    - name: Generate sources
      shell: bash
      run: dart run build_runner build --delete-conflicting-outputs
